const WEEK_A_ANCHOR = new Date("2026-03-16");

function getMondayOfWeek(date) {
  const d = new Date(date); const day = d.getDay();
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1)); d.setHours(0,0,0,0); return d;
}
function getWeekSchedule(date) {
  const monday = getMondayOfWeek(date);
  const diff = Math.round((monday - WEEK_A_ANCHOR) / (7 * 86400000));
  return diff % 2 === 0 ? weekASchedule : weekBSchedule;
}
function toYMD(date) { return date.toISOString().slice(0,10); }
function getDateForOffset(monday, offset) {
  const d = new Date(monday); d.setDate(d.getDate() + offset); return toYMD(d);
}
function getOwnerForDate(ds, extraMap) {
  if (extraMap && extraMap.has(ds)) return extraMap.get(ds);
  const d = new Date(ds); const idx = d.getDay() === 0 ? 6 : d.getDay() - 1;

// ── Auth screens ──────────────────────────────────────────────────────────────
function AuthScreen({ onAuth }) {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [name, setName] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [message, setMessage] = useState("");

  const login = async () => {
    if (!email || !password) { setError("Please enter email and password"); return; }
    setLoading(true); setError("");
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) setError(error.message);
    setLoading(false);
  };

  const signup = async () => {
    if (!email || !password || !name) { setError("Please fill in all fields"); return; }
    if (password.length < 6) { setError("Password must be at least 6 characters"); return; }
    setLoading(true); setError("");
    const { error } = await sb.auth.signUp({ email, password, options: { data: { display_name: name } } });
    if (error) setError(error.message);
    else setMessage("Check your email to confirm your account, then come back and log in.");
    setLoading(false);
  };

  const resetPassword = async () => {
    if (!email) { setError("Please enter your email"); return; }
    setLoading(true); setError("");
    const { error } = await sb.auth.resetPasswordForEmail(email);
    if (error) setError(error.message);
    else setMessage("Password reset email sent. Check your inbox.");
    setLoading(false);
  };

  return (
    <div style={{ minHeight:"100vh", background:C.bg, fontFamily:F, maxWidth:430, margin:"0 auto", display:"flex", flexDirection:"column" }}>
      <div style={{ background:`linear-gradient(170deg, #7C3AED 0%, #EC4899 55%, #1E293B 100%)`, padding:"80px 20px 40px", textAlign:"center" }}>
        <div style={{ fontSize:48, marginBottom:12 }}>{"\uD83C\uDFE0\uD83E\uDEF1\uD83C\uDFE0"}</div>
        <div style={{ fontSize:36, fontWeight:900, color:"#fff", letterSpacing:-1 }}>Baton</div>
        <div style={{ fontSize:15, color:"rgba(255,255,255,0.75)", marginTop:6 }}>Co-parenting, simplified</div>
      </div>
      <div style={{ padding:"32px 24px", flex:1 }}>
        <div style={{ display:"flex", gap:8, marginBottom:24 }}>
          {["login","signup"].map(m=><button key={m} onClick={()=>{setMode(m);setError("");setMessage("");}} style={{ flex:1, padding:"10px 0", borderRadius:14, border:"none", cursor:"pointer", fontFamily:F, fontWeight:700, fontSize:14, background:mode===m?C.purple:C.purpleLight, color:mode===m?"#fff":C.purple }}>{m==="login"?"Log in":"Sign up"}</button>)}
        </div>
        {message
          ? <Card><div style={{ fontFamily:F, fontSize:14, color:C.green, lineHeight:1.6 }}>{message}</div></Card>
          : <>
              {mode==="signup" && <FieldInput label="Your name" value={name} onChange={setName} placeholder="e.g. James" />}
              <FieldInput label="Email" value={email} onChange={setEmail} placeholder="you@email.com" type="email" />
              {mode!=="reset" && <FieldInput label="Password" value={password} onChange={setPassword} placeholder="At least 6 characters" type="password" />}
              {error && <div style={{ background:C.redLight, color:C.red, borderRadius:12, padding:"10px 14px", fontFamily:F, fontSize:13, fontWeight:600, marginBottom:10 }}>{error}</div>}
              {mode==="login" && <PrimaryBtn onClick={login} disabled={loading}>{loading?"Logging in...":"Log in"}</PrimaryBtn>}
              {mode==="signup" && <PrimaryBtn onClick={signup} disabled={loading}>{loading?"Creating account...":"Create account"}</PrimaryBtn>}
              {mode==="reset" && <PrimaryBtn onClick={resetPassword} disabled={loading}>{loading?"Sending...":"Send reset email"}</PrimaryBtn>}
              {mode==="login" && <GhostBtn onClick={()=>{setMode("reset");setError("");setMessage("");}}>Forgot password?</GhostBtn>}
              {mode==="reset" && <GhostBtn onClick={()=>{setMode("login");setError("");setMessage("");}}>Back to log in</GhostBtn>}
            </>
        }
      </div>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&display=swap'); * { box-sizing:border-box; margin:0; padding:0; } @keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}

// ── Family setup ──────────────────────────────────────────────────────────────
function FamilySetupScreen({ user, onSetup }) {

    setLoading(true); setError("");
    try {
      const code = generateInviteCode();
      const { data: family, error: fe } = await sb.from("families").insert({ name: familyName.trim(), invite_code: code }).select().single();

      const { error: me } = await sb.from("family_members").insert({ family_id: family.id, user_id: user.id, role: "admin", display_name: user.user_metadata?.display_name || "Parent" });

      await sb.from("family_settings").insert({ family_id: family.id });

            <div style={{ display:"flex", alignItems:"center", gap:16 }}>

// ── Schedule strip ────────────────────────────────────────────────────────────
function WeekRow({ schedule, label, isCurrentWeek, todayIdx, extraMap, sportDays, holidayDateSet, holidayOwnerMap, dadEmoji, mumEmoji, events=[] }) {
  const today = new Date();
  const base = isCurrentWeek ? today : new Date(today.getTime() + 7*86400000);
  const monday = getMondayOfWeek(base);
  return (
    <div style={{ marginBottom:isCurrentWeek?14:0 }}>
      <div style={{ fontFamily:F, fontSize:11, fontWeight:800, color:isCurrentWeek?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.5)", letterSpacing:0.8, textTransform:"uppercase", marginBottom:8, display:"flex", alignItems:"center", gap:6 }}>
        {label}
        {isCurrentWeek && <span style={{ background:"rgba(255,255,255,0.25)", color:"#fff", borderRadius:6, padding:"1px 7px", fontSize:10 }}>now</span>}
      </div>
      <div style={{ display:"flex", gap:5 }}>
        {schedule.map((s,i)=>{
          const ds = getDateForOffset(monday, i);
          const isToday = isCurrentWeek && i===todayIdx;
          const isExtra = extraMap.has(ds);
          const isHoliday = holidayDateSet && holidayDateSet.has(ds);
          const baseOwner = isExtra ? extraMap.get(ds) : s.who;
          const owner = (isHoliday && holidayOwnerMap && holidayOwnerMap.has(ds)) ? holidayOwnerMap.get(ds) : baseOwner;
          const dots = sportDays.filter(sd=>sd.day_of_week===new Date(ds).getDay());
          const hasEvent = events.some(ev=>ev.date===ds);
          const dayNum = new Date(ds).getDate();
          const tintBg = owner==="dad"?"rgba(219,234,254,0.55)":"rgba(252,231,243,0.55)";
          const tintBorder = owner==="dad"?"rgba(147,197,253,0.8)":"rgba(249,168,212,0.8)";
          const cellBg = isExtra?"rgba(187,247,208,0.55)":tintBg;
          const cellBorder = isToday?"3px solid #FCD34D":isExtra?"2px solid rgba(22,163,74,0.6)":isHoliday?"2.5px solid #F59E0B":hasEvent?`2px solid rgba(124,58,237,0.6)"`:(`2px solid ${tintBorder}`);
          const numColor = isExtra?"#15803d":owner==="dad"?"#1d4ed8":"#be185d";
          return (
            <div key={i} style={{ flex:1, textAlign:"center", borderRadius:14, padding:"8px 2px 7px", background:cellBg, border:cellBorder, opacity:!isCurrentWeek?0.75:1 }}>
              <div style={{ fontSize:10, fontWeight:700, fontFamily:F, color:numColor, marginBottom:2 }}>{s.day.slice(0,2)}</div>
              <div style={{ fontSize:15, marginBottom:2 }}>{owner==="dad"?dadEmoji:mumEmoji}</div>
              <div style={{ fontSize:10, fontWeight:800, fontFamily:F, color:numColor }}>{dayNum}</div>
              {isHoliday && <div style={{ fontSize:8 }}>{"\u2600\uFE0F"}</div>}
              {(dots.length>0||hasEvent) && <div style={{ display:"flex", justifyContent:"center", gap:1, marginTop:1 }}>{dots.slice(0,1).map(sd=><span key={sd.id} style={{ fontSize:9 }}>{sd.emoji}</span>)}{hasEvent && <span style={{ fontSize:9 }}>{PIN}</span>}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Year view ─────────────────────────────────────────────────────────────────
function YearView({ extras, events, sportDays, holidayDateSet, holidayOwnerMap }) {
  const today = new Date();
  const [viewYear, setViewYear] = useState(today.getFullYear());
  const [selectedDay, setSelectedDay] = useState(null);
  const extraMap = new Map(extras.filter(e=>e.status==="accepted").map(e=>[e.date, getExtraOwner(e)]));
  const pendingSet = new Set(extras.filter(e=>e.status==="pending").map(e=>e.date));
  return (
    <div style={{ padding:"0 16px 32px" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", margin:"16px 0" }}>
        <button onClick={()=>setViewYear(v=>v-1)} style={{ background:C.purpleLight, color:C.purple, border:"none", borderRadius:12, padding:"8px 16px", fontFamily:F, fontWeight:800, fontSize:18, cursor:"pointer" }}>{"<"}</button>
        <span style={{ fontFamily:F, fontWeight:900, fontSize:20, color:C.text }}>{viewYear}</span>
        <button onClick={()=>setViewYear(v=>v+1)} style={{ background:C.purpleLight, color:C.purple, border:"none", borderRadius:12, padding:"8px 16px", fontFamily:F, fontWeight:800, fontSize:18, cursor:"pointer" }}>{">"}</button>
      </div>
      {Array.from({length:12},(_,m)=>{
        const daysInMonth = new Date(viewYear,m+1,0).getDate();
        const firstDay = (()=>{const d=new Date(viewYear,m,1).getDay();return d===0?6:d-1;})();
        const monthName = new Date(viewYear,m,1).toLocaleDateString("en-GB",{month:"long"});
        return (
          <Card key={m} style={{ padding:"14px 14px" }}>
            <div style={{ fontFamily:F, fontWeight:800, fontSize:13, color:C.text, marginBottom:8 }}>{monthName}</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2, marginBottom:3 }}>
              {["M","T","W","T","F","S","S"].map((d,i)=><div key={i} style={{ textAlign:"center", fontFamily:F, fontSize:8, fontWeight:700, color:C.muted }}>{d}</div>)}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2 }}>
              {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`} />)}
              {Array.from({length:daysInMonth},(_,i)=>{
                const dn=i+1;
                const ds=`${viewYear}-${String(m+1).padStart(2,"0")}-${String(dn).padStart(2,"0")}`;
                const isToday=ds===toYMD(today);
                const isExtra=extraMap.has(ds);
                const isPending=pendingSet.has(ds);
                const isHoliday=holidayDateSet&&holidayDateSet.has(ds);
                const owner=getOwnerForDate(ds,extraMap);
                const dayEvents=events.filter(ev=>ev.date===ds);
                const hasEvent=dayEvents.length>0;
                const dots=sportDays.filter(sd=>sd.day_of_week===new Date(ds).getDay());
                let bg=owner==="dad"?C.blueLight:C.pinkLight;
                let tc=owner==="dad"?C.blue:C.pink;
                let border="1px solid transparent";
                if(isHoliday){border="2px solid #F59E0B";}
                if(isExtra){bg=C.greenLight;tc=C.green;border=`1px solid ${C.green}`;}
                if(isPending){bg=C.orangeLight;tc=C.orange;border=`1px solid ${C.orange}`;}
                if(hasEvent){bg=C.purpleLight;tc=C.purple;border=`1px solid ${C.purple}`;}
                if(isToday){border=`2px solid ${C.purple}`;}
                return (
                  <div key={dn} onClick={()=>setSelectedDay(selectedDay===ds?null:ds)} style={{ textAlign:"center", borderRadius:6, padding:"3px 1px 2px", background:bg, border, cursor:"pointer" }}>
                    <div style={{ fontFamily:F, fontSize:9, fontWeight:isToday?900:600, color:tc }}>{dn}</div>
                    <div style={{ display:"flex", justifyContent:"center", gap:1, minHeight:8 }}>
                      {dots.slice(0,1).map(sd=><span key={sd.id} style={{ fontSize:6 }}>{sd.emoji}</span>)}
                      {hasEvent && <span style={{ fontSize:7 }}>{PIN}</span>}
                    </div>
                  </div>
                );
              })}
            </div>
            {selectedDay && selectedDay.startsWith(`${viewYear}-${String(m+1).padStart(2,"0")}`) && (()=>{
              const owner=getOwnerForDate(selectedDay,extraMap);
              const dots=sportDays.filter(sd=>sd.day_of_week===new Date(selectedDay).getDay());
              const extra=extras.find(e=>e.date===selectedDay);
              const dayEvs=events.filter(ev=>ev.date===selectedDay);
              return (
                <div style={{ marginTop:10, background:C.purpleLight, borderRadius:12, padding:"10px 12px" }}>
                  <div style={{ fontFamily:F, fontWeight:800, fontSize:12, color:C.purple, marginBottom:6 }}>
                    {new Date(selectedDay).toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})}
                  </div>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                    <Chip text={owner==="dad"?"Dad":"Mum"} color={owner==="dad"?C.blue:C.pink} colorLight={owner==="dad"?C.blueLight:C.pinkLight} />
                    {extra && <Chip text={typeConfig[extra.type]?.label||extra.type} color={statusConfig[extra.status]?.color||C.muted} colorLight={statusConfig[extra.status]?.colorLight||"#F3F4F6"} />}
                    {dots.map(sd=><Chip key={sd.id} text={sd.label} color={sd.color||C.blue} colorLight={sd.color_light||C.blueLight} />)}
                    {dayEvs.map(ev=><Chip key={ev.id} text={`${ev.emoji} ${ev.title}`} color={C.purple} colorLight={C.purpleLight} />)}
                  </div>
                </div>
              );
            })()}
          </Card>
        );
      })}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function Baton() {
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);
  const [family, setFamily] = useState(null);
  const [familyId, setFamilyId] = useState(null);

  // App data
  const [kids, setKids] = useState([]);
  const [events, setEvents] = useState([]);
  const [sportDays, setSportDays] = useState([]);
  const [extras, setExtras] = useState([]);
  const [holidays, setHolidays] = useState([]);
  const [notes, setNotes] = useState([]);
  const [birthdays, setBirthdays] = useState([]);
  const [routines, setRoutines] = useState([]);
  const [clothing, setClothing] = useState([]);
  const [profiles, setProfiles] = useState({});
  const [dadEmoji, setDadEmoji] = useState("\uD83D\uDC68");
  const [mumEmoji, setMumEmoji] = useState("\uD83D\uDC69");
  const [dataLoading, setDataLoading] = useState(false);

  const [openScreen, setOpenScreen] = useState(null);
  const [showYear, setShowYear] = useState(false);
  const [showSettings, setShowSettings] = useState(false);

  // Auth listener
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{ setSession(session); setLoading(false); });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_,session)=>setSession(session));
    return ()=>subscription.unsubscribe();
  },[]);

  // Load family when session exists
  useEffect(()=>{
    if (!session) { setFamily(null); setFamilyId(null); return; }
    loadFamily();
  },[session]);

  const loadFamily = async () => {
    const { data } = await sb.from("family_members").select("family_id, families(*)").eq("user_id", session.user.id).single();
    if (data) { setFamily(data.families); setFamilyId(data.family_id); }
  };

  // Load all data when family is set
  useEffect(()=>{
    if (!familyId) return;
    loadAllData();
    const subs = setupRealtime();
    return ()=>{ subs.forEach(s=>s.unsubscribe()); };
  },[familyId]);

  const loadAllData = async () => {
    setDataLoading(true);
    const fid = familyId;
    const [k,ev,sp,ex,ho,no,bi,ro,cl,pr,fs] = await Promise.all([
      sb.from("kids").select("*").eq("family_id",fid).order("created_at"),
      sb.from("events").select("*").eq("family_id",fid).order("date"),
      sb.from("sport_days").select("*").eq("family_id",fid),
      sb.from("extras").select("*").eq("family_id",fid).order("date"),
      sb.from("holidays").select("*").eq("family_id",fid).order("start_date"),
      sb.from("notes").select("*").eq("family_id",fid).order("created_at",{ascending:false}),
      sb.from("birthdays").select("*").eq("family_id",fid),
      sb.from("routines").select("*").eq("family_id",fid),
      sb.from("clothing").select("*").eq("family_id",fid),
      sb.from("profiles").select("*").eq("family_id",fid),
      sb.from("family_settings").select("*").eq("family_id",fid).single(),
    ]);
    if (k.data) setKids(k.data);
    if (ev.data) setEvents(ev.data);
    if (sp.data) setSportDays(sp.data);
    if (ex.data) setExtras(ex.data);
    if (ho.data) setHolidays(ho.data);
    if (no.data) setNotes(no.data);
    if (bi.data) setBirthdays(bi.data);
    if (ro.data) setRoutines(ro.data);
    if (cl.data) setClothing(cl.data);
    if (pr.data) {
      const pm = {};
      pr.data.forEach(p=>{ pm[p.kid_id]=p; });
      setProfiles(pm);
    }
    if (fs.data) { setDadEmoji(fs.data.dad_emoji||"\uD83D\uDC68"); setMumEmoji(fs.data.mum_emoji||"\uD83D\uDC69"); }
    setDataLoading(false);
  };

  const setupRealtime = () => {
    const tables = ["kids","events","sport_days","extras","holidays","notes","birthdays","routines","clothing","profiles","family_settings"];
    return tables.map(t=>
      sb.channel(`${t}_changes`).on("postgres_changes",{event:"*",schema:"public",table:t,filter:`family_id=eq.${familyId}`},()=>loadAllData()).subscribe()
    );
  };

  // DB helpers
  const db = {
    add: async (table, data) => { const {data:d,error} = await sb.from(table).insert({...data, family_id:familyId}).select().single(); return d; },
    update: async (table, id, data) => { await sb.from(table).update(data).eq("id",id); },
    remove: async (table, id) => { await sb.from(table).delete().eq("id",id); },
  };

  if (loading) return <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center" }}><Spinner /></div>;
  if (!session) return <AuthScreen onAuth={setSession} />;
  if (!familyId) return <FamilySetupScreen user={session.user} onSetup={fam=>{ setFamily(fam); setFamilyId(fam.id); }} />;

  const today = new Date();
  const dayIdx = today.getDay()===0?6:today.getDay()-1;
  const thisWeek = getWeekSchedule(today);
  const nextWeekDate = new Date(today); nextWeekDate.setDate(today.getDate()+7);
  const nextWeek = getWeekSchedule(nextWeekDate);
  const todayOwner = thisWeek[dayIdx].who;

  const extraMap = new Map(extras.filter(e=>e.status==="accepted").map(e=>[e.date, getExtraOwner(e)]));
  const pendingCount = extras.filter(e=>e.status==="pending").length;
  const recentNotes = notes.filter(n=>{ const d=new Date(n.created_at); return (Date.now()-d)<86400000; }).length;
  const nextEvent = [...events].sort((a,b)=>a.date.localeCompare(b.date)).find(e=>e.date>=toYMD(today));
  const nextHoliday = [...holidays].sort((a,b)=>a.start_date.localeCompare(b.start_date)).find(h=>h.end_date>=toYMD(today));

  const getNextBirthday = ds=>{ const [,m,d]=ds.split("-"); const t=new Date(today.getFullYear(),parseInt(m)-1,parseInt(d)); return t>=today?t:new Date(today.getFullYear()+1,parseInt(m)-1,parseInt(d)); };
  const upcomingBirthday = birthdays.length>0?Math.min(...birthdays.map(b=>Math.ceil((getNextBirthday(b.date)-today)/86400000))):null;

  const holidayOwnerMap = new Map();
  holidays.forEach(h=>{ const d=new Date(h.start_date); while(toYMD(d)<=h.end_date){ const ds=toYMD(d); if((h.dad_days||[]).includes(ds)) holidayOwnerMap.set(ds,"dad"); else if((h.dad_days||[]).length>0) holidayOwnerMap.set(ds,"mum"); d.setDate(d.getDate()+1); } });
  const holidayDateSet = new Set();
  holidays.forEach(h=>{ const d=new Date(h.start_date); while(toYMD(d)<=h.end_date){ holidayDateSet.add(toYMD(new Date(d))); d.setDate(d.getDate()+1); } });

  const todayStr = toYMD(today);
  const upcomingItems = [
    ...[...events].filter(e=>e.date>=todayStr).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,4).map(e=>({type:"event",date:e.date,label:e.title,emoji:e.emoji,color:C.teal,colorLight:C.tealLight,screen:"events"})),
    ...birthdays.map(b=>{ const next=getNextBirthday(b.date); return {type:"birthday",date:toYMD(next),label:b.name,emoji:CAKE,color:C.pink,colorLight:C.pinkLight,screen:"birthdays"}; }).filter(b=>b.date>=todayStr).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,2),
  ].sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);

  const tiles = [
    { id:"profiles",  label:"Profiles",   emoji:"\uD83D\uDC64", color:C.purple, colorLight:C.purpleLight, subtitle:kids.length?kids.map(k=>k.name).join(" & "):"Add your children", wide:true },
    { id:"events",    label:"Events",     emoji:PIN,            color:C.teal,   colorLight:C.tealLight,   subtitle:nextEvent?`Next: ${nextEvent.title}`:"No events yet" },
    { id:"extras",    label:"Swaps",      emoji:"\u2B50",       color:C.orange, colorLight:C.orangeLight, subtitle:pendingCount?`${pendingCount} pending`:"No pending requests", badge:pendingCount },
    { id:"holidays",  label:"Holidays",   emoji:"\uD83C\uDFD6\uFE0F", color:C.yellow, colorLight:C.yellowLight, subtitle:nextHoliday?`Next: ${nextHoliday.name}`:"No holidays set" },
    { id:"birthdays", label:"Birthdays",  emoji:CAKE,           color:C.pink,   colorLight:C.pinkLight,   subtitle:upcomingBirthday!==null?`Next in ${upcomingBirthday}d`:"Add birthdays", badge:upcomingBirthday!==null&&upcomingBirthday<=7?1:0 },
    { id:"routines",  label:"Routines",   emoji:"\uD83C\uDF19", color:C.purple, colorLight:C.purpleLight, subtitle:routines.length?`${routines.length} routine${routines.length>1?"s":""}`:"Set up routines" },
    { id:"clothing",  label:"Clothing",   emoji:"\uD83D\uDC55", color:C.blue,   colorLight:C.blueLight,   subtitle:"Track where things are" },
    { id:"handover",  label:"Handover",   emoji:"\uD83D\uDCAC", color:C.teal,   colorLight:C.tealLight,   subtitle:notes.length?`${notes.length} note${notes.length>1?"s":""}`:"Leave notes at swap", badge:recentNotes, wide:true },
    { id:"scan",      label:"Scan",       emoji:"\uD83D\uDCF8", color:C.orange, colorLight:C.orangeLight, subtitle:"Photo to calendar" },
  ];

  const screenTitles = { profiles:"Profiles", events:"Events & Activities", extras:"Swaps", holidays:"Holidays & Terms", birthdays:"Birthdays", routines:"Routines", clothing:"Clothing", handover:"Handover Notes", scan:"Scan a Document", settings:"Settings" };

  return (
    <div style={{ minHeight:"100vh", background:C.bg, fontFamily:F, maxWidth:430, margin:"0 auto", paddingBottom:32 }}>
      <div style={{ background:"linear-gradient(170deg, #7C3AED 0%, #EC4899 55%, #1E293B 100%)", padding:"52px 20px 20px" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16 }}>
          <div>
            <div style={{ fontSize:28, fontWeight:900, color:"#fff", letterSpacing:-0.5 }}>{"\uD83C\uDFE0\uD83E\uDEF1\uD83C\uDFE0"} Baton</div>
            <div style={{ fontSize:13, color:"rgba(255,255,255,0.75)", marginTop:2 }}>{today.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})}</div>
          </div>
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            <button onClick={()=>setShowSettings(true)} style={{ background:"rgba(255,255,255,0.15)", border:"none", borderRadius:20, padding:"6px 14px", fontSize:14, cursor:"pointer", color:"#fff", fontFamily:F, fontWeight:600 }}>
              {"\u2699\uFE0F"}
            </button>
            <div style={{ background:"rgba(255,255,255,0.2)", borderRadius:20, padding:"6px 14px", fontSize:13, fontWeight:700, color:"#fff" }}>
              {todayOwner==="dad"?`${dadEmoji} Dad`:`${mumEmoji} Mum`}
            </div>
          </div>
        </div>
        <div onClick={()=>setShowYear(true)} style={{ background:"rgba(255,255,255,0.08)", borderRadius:20, padding:"14px 16px", cursor:"pointer", border:"1px solid rgba(255,255,255,0.1)" }}>
          <WeekRow schedule={thisWeek} label="This week" isCurrentWeek={true} todayIdx={dayIdx} extraMap={extraMap} sportDays={sportDays} holidayDateSet={holidayDateSet} holidayOwnerMap={holidayOwnerMap} dadEmoji={dadEmoji} mumEmoji={mumEmoji} events={events} />
          <div style={{ height:1, background:"rgba(255,255,255,0.12)", margin:"10px 0" }} />
          <WeekRow schedule={nextWeek} label="Next week" isCurrentWeek={false} todayIdx={-1} extraMap={extraMap} sportDays={sportDays} holidayDateSet={holidayDateSet} holidayOwnerMap={holidayOwnerMap} dadEmoji={dadEmoji} mumEmoji={mumEmoji} events={events} />
          <div style={{ display:"flex", alignItems:"center", justifyContent:"center", marginTop:10 }}>
            <span style={{ fontFamily:F, fontSize:11, fontWeight:700, color:"rgba(255,255,255,0.7)" }}>Tap to see full year</span>
          </div>
        </div>
      </div>

      {upcomingItems.length>0 && (
        <div style={{ padding:"16px 16px 0" }}>
          <SecLabel>Coming up</SecLabel>
          <div style={{ display:"flex", gap:8, overflowX:"auto", paddingBottom:4 }}>
            {upcomingItems.map((item,i)=>{
              const d=new Date(item.date);
              const du=Math.ceil((d-today)/86400000);
              const dayLabel=du===0?"Today":du===1?"Tomorrow":d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
              return (
                <div key={i} onClick={()=>setOpenScreen(item.screen)} style={{ flexShrink:0, background:item.colorLight, borderRadius:16, padding:"12px 14px", minWidth:120, cursor:"pointer", border:`2px solid ${item.color}33` }}>
                  <div style={{ fontSize:22, marginBottom:5 }}>{item.emoji}</div>
                  <div style={{ fontFamily:F, fontWeight:800, fontSize:12, color:C.text, marginBottom:3, lineHeight:1.3 }}>{item.label.length>18?item.label.slice(0,17)+"...":item.label}</div>
                  <div style={{ fontFamily:F, fontSize:11, fontWeight:700, color:item.color }}>{dayLabel}</div>
                  {du>0&&du<=7&&<div style={{ fontFamily:F, fontSize:10, color:item.color, opacity:0.75 }}>{du}d away</div>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {dataLoading
        ? <div style={{ padding:"32px 0" }}><Spinner /></div>
        : (
          <div style={{ padding:"20px 16px 0" }}>
            <SecLabel>What do you need?</SecLabel>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              {tiles.map(tile=>(
                <div key={tile.id} onClick={()=>setOpenScreen(tile.id)} style={{ gridColumn:tile.wide?"1 / -1":"auto", background:C.card, borderRadius:20, padding:"18px 18px", boxShadow:"0 2px 16px rgba(124,58,237,0.07)", cursor:"pointer", position:"relative", display:"flex", flexDirection:tile.wide?"row":"column", alignItems:tile.wide?"center":"flex-start", gap:tile.wide?16:8 }}>
                  <div style={{ width:44, height:44, borderRadius:14, background:tile.colorLight, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0 }}>{tile.emoji}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontFamily:F, fontWeight:800, fontSize:15, color:C.text }}>{tile.label}</div>
                    <div style={{ fontFamily:F, fontSize:12, color:C.muted, marginTop:2 }}>{tile.subtitle}</div>
                  </div>
                  {tile.badge>0 && <div style={{ position:"absolute", top:12, right:12, background:C.orange, borderRadius:10, padding:"2px 8px", fontSize:11, fontWeight:800, color:"#fff" }}>{tile.badge}</div>}
                </div>
              ))}
            </div>
          </div>
        )
      }

      {showYear && <Modal onClose={()=>setShowYear(false)} fullScreen><SheetHeader title="Full Year" onClose={()=>setShowYear(false)} /><YearView extras={extras} events={events} sportDays={sportDays} holidayDateSet={holidayDateSet} holidayOwnerMap={holidayOwnerMap} /></Modal>}

      {showSettings && (
        <Modal onClose={()=>setShowSettings(false)} fullScreen>
          <SheetHeader title="Settings" onClose={()=>setShowSettings(false)} />
          <SettingsScreen family={family} user={session.user} dadEmoji={dadEmoji} mumEmoji={mumEmoji} setDadEmoji={setDadEmoji} setMumEmoji={setMumEmoji} familyId={familyId} onSignOut={()=>{ setSession(null); setFamily(null); setFamilyId(null); }} />
        </Modal>
      )}

      {openScreen && (
        <Modal onClose={()=>setOpenScreen(null)} fullScreen>
          <SheetHeader title={screenTitles[openScreen]||""} onClose={()=>setOpenScreen(null)} />
          {openScreen==="profiles"  && <ProfilesScreen kids={kids} setKids={setKids} profiles={profiles} setProfiles={setProfiles} familyId={familyId} db={db} />}
          {openScreen==="events"    && <EventsScreen kids={kids} events={events} setEvents={setEvents} sportDays={sportDays} setSportDays={setSportDays} familyId={familyId} db={db} />}
          {openScreen==="extras"    && <ExtrasScreen kids={kids} extras={extras} setExtras={setExtras} familyId={familyId} db={db} />}
          {openScreen==="holidays"  && <HolidaysScreen holidays={holidays} setHolidays={setHolidays} familyId={familyId} db={db} />}
          {openScreen==="birthdays" && <BirthdaysScreen birthdays={birthdays} setBirthdays={setBirthdays} kids={kids} familyId={familyId} db={db} />}
          {openScreen==="routines"  && <RoutinesScreen routines={routines} setRoutines={setRoutines} kids={kids} familyId={familyId} db={db} />}
          {openScreen==="clothing"  && <ClothingScreen kids={kids} clothing={clothing} setClothing={setClothing} familyId={familyId} db={db} />}
          {openScreen==="handover"  && <HandoverScreen notes={notes} setNotes={setNotes} kids={kids} familyId={familyId} db={db} />}
          {openScreen==="scan"      && <ScanScreen kids={kids} setEvents={setEvents} onClose={()=>setOpenScreen(null)} familyId={familyId} db={db} />}
        </Modal>
      )}

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&display=swap');
        * { box-sizing:border-box; margin:0; padding:0; }
        button:active { transform:scale(0.97); }
        @keyframes spin { to { transform:rotate(360deg); } }
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator { opacity:0.4; cursor:pointer; }
      `}</style>
    </div>
  );
}

// ── Profiles Screen ───────────────────────────────────────────────────────────
function ProfilesScreen({ kids, setKids, profiles, setProfiles, familyId, db }) {
  const [activeKid, setActiveKid] = useState(kids[0]?.id||null);
  const [editingField, setEditingField] = useState(null);
  const [tempVal, setTempVal] = useState("");
  const [showAddKid, setShowAddKid] = useState(false);
  const [showEditKid, setShowEditKid] = useState(false);
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
  const [kidForm, setKidForm] = useState({ name:"", age:"", avatar:"\uD83E\uDDD1", color:C.blue, colorLight:C.blueLight });

  const kid = kids.find(k=>k.id===activeKid);
  const p = profiles[activeKid]||{};

  const saveField = async (key) => {
    const prof = profiles[activeKid];
    if (prof?.id) { await db.update("profiles", prof.id, {[key]:tempVal}); }
    else { const np = await db.add("profiles", {kid_id:activeKid, [key]:tempVal}); if(np) setProfiles(prev=>({...prev,[activeKid]:np})); }
    setProfiles(prev=>({...prev,[activeKid]:{...prev[activeKid],[key]:tempVal}}));
    setEditingField(null);
  };

  const addKid = async () => {
    if (!kidForm.name.trim()) return;
    const newKid = await db.add("kids",{name:kidForm.name.trim(),age:parseInt(kidForm.age)||0,avatar:kidForm.avatar,color:kidForm.color,color_light:kidForm.colorLight});
    if (newKid) { setKids(prev=>[...prev,newKid]); setActiveKid(newKid.id); }
    setShowAddKid(false); setKidForm({name:"",age:"",avatar:"\uD83E\uDDD1",color:C.blue,colorLight:C.blueLight});
  };

  const saveEditKid = async () => {
    if (!kidForm.name.trim()) return;
    await db.update("kids",activeKid,{name:kidForm.name.trim(),age:parseInt(kidForm.age)||kid.age,avatar:kidForm.avatar,color:kidForm.color,color_light:kidForm.colorLight});
    setKids(prev=>prev.map(k=>k.id===activeKid?{...k,name:kidForm.name.trim(),age:parseInt(kidForm.age)||k.age,avatar:kidForm.avatar,color:kidForm.color,color_light:kidForm.colorLight}:k));
    setShowEditKid(false);
  };

  const deleteKid = async () => {
    await db.remove("kids",activeKid);
    const remaining = kids.filter(k=>k.id!==activeKid);
    setKids(remaining); setActiveKid(remaining[0]?.id||null); setShowDeleteConfirm(false);
  };

  const KidFormUI = ({form,setForm,onSubmit,submitLabel,onDelete}) => (
    <div style={{padding:"0 20px"}}>
      <AvatarPicker value={form.avatar} onChange={a=>setForm(p=>({...p,avatar:a}))} />
      <div style={{marginBottom:14}}><div style={{fontFamily:F,fontSize:11,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>Colour</div><div style={{display:"flex",gap:8}}>{PROFILE_COLORS.map(co=><button key={co.color} onClick={()=>setForm(p=>({...p,color:co.color,colorLight:co.colorLight}))} style={{width:36,height:36,borderRadius:10,border:form.color===co.color?`3px solid ${C.text}`:"3px solid transparent",background:co.color,cursor:"pointer"}} />)}</div></div>
      <FieldInput label="Name" value={form.name} onChange={v=>setForm(p=>({...p,name:v}))} placeholder="e.g. Leo" />
      <FieldInput label="Age" value={String(form.age)} onChange={v=>setForm(p=>({...p,age:v}))} type="number" placeholder="13" />
      <PrimaryBtn onClick={onSubmit}>{submitLabel}</PrimaryBtn>
      {onDelete && <DeleteBtn onClick={onDelete} />}
      <GhostBtn onClick={()=>{setShowAddKid(false);setShowEditKid(false);}}>Cancel</GhostBtn>
    </div>
  );

  if (!kid) return (
    <div style={{padding:"32px 20px",textAlign:"center"}}>
      <div style={{fontFamily:F,fontSize:15,color:C.muted,marginBottom:16}}>No profiles yet</div>
      <PrimaryBtn onClick={()=>setShowAddKid(true)}>Add first profile</PrimaryBtn>
      {showAddKid && <Modal onClose={()=>setShowAddKid(false)}><div style={{padding:"20px 20px 0",fontFamily:F,fontWeight:900,fontSize:20,color:C.text,marginBottom:16}}>Add profile</div><KidFormUI form={kidForm} setForm={setKidForm} onSubmit={addKid} submitLabel="Add profile" /></Modal>}
    </div>
  );

  return (
    <div style={{padding:"0 16px 32px"}}>
      <div style={{paddingTop:8}}>
        <div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",paddingBottom:2}}>
          {kids.map(k=><button key={k.id} onClick={()=>{setActiveKid(k.id);setEditingField(null);}} style={{flexShrink:0,padding:"8px 16px",borderRadius:14,border:"none",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:14,background:activeKid===k.id?k.color:(k.color_light||C.purpleLight),color:activeKid===k.id?"#fff":k.color}}>{k.avatar} {k.name}</button>)}
          <button onClick={()=>{setKidForm({name:"",age:"",avatar:"\uD83E\uDDD1",color:C.blue,colorLight:C.blueLight});setShowAddKid(true);}} style={{flexShrink:0,padding:"8px 14px",borderRadius:14,border:`2px dashed ${C.purpleLight}`,background:"transparent",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:14,color:C.purple}}>+ Add</button>
        </div>
      </div>
      <Card style={{marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:56,height:56,borderRadius:18,background:kid.color_light||C.purpleLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30}}>{kid.avatar}</div>
          <div style={{flex:1}}><div style={{fontFamily:F,fontWeight:900,fontSize:20,color:C.text}}>{kid.name}</div><div style={{fontFamily:F,fontSize:13,color:C.muted,marginTop:2}}>Age {kid.age}</div></div>
          <button onClick={()=>{setKidForm({name:kid.name,age:String(kid.age),avatar:kid.avatar,color:kid.color,colorLight:kid.color_light||C.blueLight});setShowEditKid(true);}} style={{background:C.purpleLight,color:C.purple,border:"none",borderRadius:10,padding:"7px 14px",fontFamily:F,fontWeight:700,fontSize:13,cursor:"pointer"}}>Edit</button>
        </div>
      </Card>
      {defaultSections.map(s=>(
        <Card key={s.label}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><span style={{width:32,height:32,borderRadius:10,background:s.colorLight,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{s.emoji}</span><span style={{fontFamily:F,fontWeight:800,fontSize:14,color:s.color}}>{s.label}</span></div>
          {s.rows.map(([label,key])=>(
            <div key={key} style={{padding:"7px 0",borderBottom:`1px solid ${C.bg}`}}>
              {editingField===`${activeKid}-${key}`
                ? <div style={{display:"flex",gap:8,alignItems:"center"}}><input autoFocus value={tempVal} onChange={e=>setTempVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveField(key)} style={{flex:1,padding:"7px 10px",borderRadius:8,border:`2px solid ${s.color}`,fontFamily:F,fontSize:13,outline:"none",background:C.bg}} /><button onClick={()=>saveField(key)} style={{background:s.color,color:"#fff",border:"none",borderRadius:8,padding:"7px 12px",fontFamily:F,fontWeight:700,fontSize:12,cursor:"pointer"}}>Save</button></div>
                : <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontFamily:F,fontSize:13,color:C.muted}}>{label}</span><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontFamily:F,fontSize:13,fontWeight:600,color:p[key]?C.text:C.muted}}>{p[key]||"—"}</span><button onClick={()=>{setTempVal(p[key]||"");setEditingField(`${activeKid}-${key}`);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:C.muted,opacity:0.6}}>edit</button></div></div>}
            </div>
          ))}
        </Card>
      ))}
      {showAddKid && <Modal onClose={()=>setShowAddKid(false)}><div style={{padding:"20px 20px 0",fontFamily:F,fontWeight:900,fontSize:20,color:C.text,marginBottom:16}}>Add profile</div><KidFormUI form={kidForm} setForm={setKidForm} onSubmit={addKid} submitLabel="Add profile" /></Modal>}
      {showEditKid && <Modal onClose={()=>setShowEditKid(false)}><div style={{padding:"20px 20px 0",fontFamily:F,fontWeight:900,fontSize:20,color:C.text,marginBottom:16}}>Edit profile</div><KidFormUI form={kidForm} setForm={setKidForm} onSubmit={saveEditKid} submitLabel="Save changes" onDelete={kids.length>1?()=>setShowDeleteConfirm(true):null} /></Modal>}
      {showDeleteConfirm && <Modal onClose={()=>setShowDeleteConfirm(false)}><div style={{padding:"20px 20px 0"}}><div style={{fontFamily:F,fontWeight:900,fontSize:20,color:C.text,marginBottom:8}}>Delete {kid.name}?</div><div style={{fontFamily:F,fontSize:14,color:C.muted,marginBottom:20}}>This will remove their profile and all their info.</div><PrimaryBtn onClick={deleteKid} bg={C.red}>Yes, delete</PrimaryBtn><GhostBtn onClick={()=>setShowDeleteConfirm(false)}>Cancel</GhostBtn></div></Modal>}
    </div>
  );
}

// ── Events Screen ─────────────────────────────────────────────────────────────
function EventsScreen({ kids, events, setEvents, sportDays, setSportDays, familyId, db }) {
  const today = new Date();
  const [mode, setMode] = useState("events");
  const [showAdd, setShowAdd] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({kidIds:[],title:"",date:"",time:"",who:"dad",emoji:PIN,type:"other"});
  const [sportForm, setSportForm] = useState({kidId:kids[0]?.id,label:"",emoji:"\u26BD",dayOfWeek:1,time:"",color:C.blue,colorLight:C.blueLight});
  const [error, setError] = useState("");
  const colorOptions = [{color:C.blue,colorLight:C.blueLight},{color:C.pink,colorLight:C.pinkLight},{color:C.teal,colorLight:C.tealLight},{color:C.orange,colorLight:C.orangeLight},{color:C.purple,colorLight:C.purpleLight},{color:C.green,colorLight:C.greenLight}];

  const submitEvent = async () => {
    if (!form.title.trim()||!form.date||form.kidIds.length===0){setError("Please fill in title, date and select kids");return;}
    setError("");
    const kidUUIDs = form.kidIds;
    if (editing) { await db.update("events",editing,{...form,kid_ids:kidUUIDs}); setEvents(prev=>prev.map(e=>e.id===editing?{...e,...form,kid_ids:kidUUIDs}:e)); }
    else { const ne=await db.add("events",{...form,kid_ids:kidUUIDs}); if(ne) setEvents(prev=>[...prev,ne]); }
    setShowAdd(false); setEditing(null);
  };

  const submitSport = async () => {
    if (!sportForm.label.trim()){setError("Please add a name");return;}
    setError("");
    const data = {...sportForm, kid_id:sportForm.kidId, day_of_week:sportForm.dayOfWeek, color_light:sportForm.colorLight};
    if (editing) { await db.update("sport_days",editing,data); setSportDays(prev=>prev.map(s=>s.id===editing?{...s,...data}:s)); }
    else { const ns=await db.add("sport_days",data); if(ns) setSportDays(prev=>[...prev,ns]); }
    setShowAdd(false); setEditing(null);
  };

  return (
    <div style={{padding:"0 16px 32px"}}>
      <div style={{display:"flex",gap:10,margin:"12px 0 16px"}}>
        {[{id:"events",label:"Events"},{id:"sport",label:"Activities"}].map(m=><button key={m.id} onClick={()=>setMode(m.id)} style={{flex:1,padding:"10px 0",borderRadius:14,border:"none",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:13,background:mode===m.id?C.purple:C.purpleLight,color:mode===m.id?"#fff":C.purple}}>{m.label}</button>)}
      </div>
      {mode==="events" && <>
        {[...events].sort((a,b)=>a.date.localeCompare(b.date)).map(ev=>{
          const evKids=kids.filter(k=>(ev.kid_ids||[]).includes(k.id));
          const d=new Date(ev.date); const du=Math.ceil((d-today)/86400000);
          const et=eventTypes.find(t=>t.id===ev.type)||eventTypes[3];
          return (<Card key={ev.id} onClick={()=>{setForm({...ev,kidIds:ev.kid_ids||[]});setEditing(ev.id);setShowAdd(true);}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:14}}>
              <div style={{width:44,height:44,borderRadius:14,background:et.colorLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{ev.emoji}</div>
              <div style={{flex:1}}>

        <button onClick={()=>{setSportForm({kidId:kids[0]?.id,label:"",emoji:"\u26BD",dayOfWeek:1,time:"",color:C.blue,colorLight:C.blueLight});setError("");setEditing(null);setShowAdd(true);}} style={{width:"100%",padding:"14px 0",borderRadius:16,border:`2px dashed ${C.purpleLight}`,background:"transparent",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:14,color:C.purple,marginTop:4}}>+ Add activity</button>
      </>}

s taking them?</div><div style={{display:"flex",gap:8}}>{["dad","mum"].map(pw=><button key={pw} onClick={()=>setForm(prev=>({...prev,who:pw}))} style={{flex:1,padding:"10px 0",borderRadius:14,border:"none",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:14,background:form.who===pw?(pw==="dad"?C.blue:C.pink):(pw==="dad"?C.blueLight:C.pinkLight),color:form.who===pw?"#fff":(pw==="dad"?C.blue:C.pink)}}>{pw==="dad"?"Dad":"Mum"}</button>)}</div></div>{error&&<div style={{background:C.redLight,color:C.red,borderRadius:12,padding:"10px 14px",fontFamily:F,fontSize:13,fontWeight:600,marginBottom:10}}>{error}</div>}<PrimaryBtn onClick={submitEvent}>{editing?"Save changes":"Add event"}</PrimaryBtn>{editing&&<DeleteBtn onClick={async()=>{await db.remove("events",editing);setEvents(prev=>prev.filter(e=>e.id!==editing));setEditing(null);setShowAdd(false);}} />}<GhostBtn onClick={()=>{setShowAdd(false);setEditing(null);setError("");}}>Cancel</GhostBtn></div></Modal>}
      {showAdd && mode==="sport" && <Modal onClose={()=>{setShowAdd(false);setEditing(null);setError("");}}><div style={{padding:"20px 20px 0",fontFamily:F,fontWeight:900,fontSize:20,color:C.text,marginBottom:16}}>{editing?"Edit activity":"New activity"}</div><div style={{padding:"0 20px"}}><FieldInput label="Activity name" value={sportForm.label} onChange={v=>setSportForm(p=>({...p,label:v}))} placeholder="e.g. Football training" /><FieldInput label="Emoji" value={sportForm.emoji} onChange={v=>setSportForm(p=>({...p,emoji:v}))} placeholder="⚽" /><div style={{marginBottom:14}}><div style={{fontFamily:F,fontSize:11,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>Which kid?</div><div style={{display:"flex",gap:8}}>{kids.map(k=><button key={k.id} onClick={()=>setSportForm(p=>({...p,kidId:k.id}))} style={{flex:1,padding:"10px 0",borderRadius:14,border:"none",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:14,background:sportForm.kidId===k.id?k.color:(k.color_light||C.purpleLight),color:sportForm.kidId===k.id?"#fff":k.color}}>{k.avatar} {k.name}</button>)}</div></div><div style={{marginBottom:14}}><div style={{fontFamily:F,fontSize:11,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>Day of week</div><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{DAY_NAMES.map((d,i)=><button key={i} onClick={()=>setSportForm(p=>({...p,dayOfWeek:i}))} style={{padding:"8px 10px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:12,background:sportForm.dayOfWeek===i?C.purple:C.purpleLight,color:sportForm.dayOfWeek===i?"#fff":C.purple}}>{d}</button>)}</div></div><FieldInput label="Time (optional)" value={sportForm.time||""} onChange={v=>setSportForm(p=>({...p,time:v}))} type="time" /><div style={{marginBottom:14}}><div style={{fontFamily:F,fontSize:11,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>Colour</div><div style={{display:"flex",gap:8}}>{colorOptions.map(co=><button key={co.color} onClick={()=>setSportForm(p=>({...p,color:co.color,colorLight:co.colorLight}))} style={{width:32,height:32,borderRadius:10,border:sportForm.color===co.color?`3px solid ${C.text}`:"3px solid transparent",background:co.color,cursor:"pointer"}} />)}</div></div>{error&&<div style={{background:C.redLight,color:C.red,borderRadius:12,padding:"10px 14px",fontFamily:F,fontSize:13,fontWeight:600,marginBottom:10}}>{error}</div>}<PrimaryBtn onClick={submitSport}>{editing?"Save changes":"Add activity"}</PrimaryBtn>{editing&&<DeleteBtn onClick={async()=>{await db.remove("sport_days",editing);setSportDays(prev=>prev.filter(s=>s.id!==editing));setEditing(null);setShowAdd(false);}} />}<GhostBtn onClick={()=>{setShowAdd(false);setEditing(null);setError("");}}>Cancel</GhostBtn></div></Modal>}
    </div>
  );
}

// ── Extras/Swaps Screen ───────────────────────────────────────────────────────
function ExtrasScreen({ kids, extras, setExtras, familyId, db }) {
  const [showNew, setShowNew] = useState(false);
  const [editingReq, setEditingReq] = useState(null);
  const [respondingTo, setRespondingTo] = useState(null);
  const [responseText, setResponseText] = useState("");
  const [newReq, setNewReq] = useState({type:"want_extra",from_parent:"dad",kidIds:[],date:"",time:"",reason:""});
  const [filter, setFilter] = useState("all");
  const [error, setError] = useState("");

  const respond = async (id, status) => {
    await db.update("extras", id, {status, response:responseText});
    setExtras(prev=>prev.map(e=>e.id===id?{...e,status,response:responseText}:e));
    setRespondingTo(null); setResponseText("");
  };

  const submitNew = async () => {
    if (!newReq.date||newReq.kidIds.length===0||!newReq.reason.trim()){setError("Please fill in all fields");return;}
    setError("");
    const ne = await db.add("extras",{...newReq,from_parent:newReq.from_parent,kid_ids:newReq.kidIds,status:"pending",response:""});
    if (ne) setExtras(prev=>[...prev,ne]);
    setNewReq({type:"want_extra",from_parent:"dad",kidIds:[],date:"",time:"",reason:""}); setShowNew(false);
  };

  const saveEdit = async () => {
    if (!editingReq.date||editingReq.kidIds.length===0||!editingReq.reason.trim()){setError("Please fill in all fields");return;}
    setError("");
    await db.update("extras",editingReq.id,{...editingReq,kid_ids:editingReq.kidIds});
    setExtras(prev=>prev.map(e=>e.id===editingReq.id?{...editingReq,kid_ids:editingReq.kidIds}:e));
    setEditingReq(null);
  };

  const filtered = filter==="all"?extras:extras.filter(e=>e.status===filter);
  const pendingCount = extras.filter(e=>e.status==="pending").length;

  const ReqForm = ({req,setReq}) => (
    <div style={{padding:"0 20px"}}>
      <div style={{marginBottom:14}}><div style={{fontFamily:F,fontSize:11,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>Type</div><div style={{display:"flex",gap:8}}>{Object.entries(typeConfig).map(([id,tc])=><button key={id} onClick={()=>setReq(p=>({...p,type:id}))} style={{flex:1,padding:"10px 6px",borderRadius:14,border:"none",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:12,background:req.type===id?C.purple:C.purpleLight,color:req.type===id?"#fff":C.purple}}>{tc.label}</button>)}</div></div>
      <div style={{marginBottom:14}}><div style={{fontFamily:F,fontSize:11,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>From</div><div style={{display:"flex",gap:8}}>{["dad","mum"].map(pw=><button key={pw} onClick={()=>setReq(prev=>({...prev,from_parent:pw}))} style={{flex:1,padding:"10px 0",borderRadius:14,border:"none",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:14,background:req.from_parent===pw?(pw==="dad"?C.blue:C.pink):(pw==="dad"?C.blueLight:C.pinkLight),color:req.from_parent===pw?"#fff":(pw==="dad"?C.blue:C.pink)}}>{pw==="dad"?"Dad":"Mum"}</button>)}</div></div>
      <div style={{marginBottom:14}}><div style={{fontFamily:F,fontSize:11,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>Which kids?</div><div style={{display:"flex",gap:8}}>{kids.map(k=><button key={k.id} onClick={()=>setReq(p=>({...p,kidIds:p.kidIds.includes(k.id)?p.kidIds.filter(id=>id!==k.id):[...p.kidIds,k.id]}))} style={{flex:1,padding:"10px 0",borderRadius:14,border:"none",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:14,background:req.kidIds.includes(k.id)?k.color:(k.color_light||C.purpleLight),color:req.kidIds.includes(k.id)?"#fff":k.color}}>{k.avatar} {k.name}</button>)}</div></div>
      <FieldInput label="Date" value={req.date} onChange={v=>setReq(p=>({...p,date:v}))} type="date" />
      <FieldInput label="Time (optional)" value={req.time||""} onChange={v=>setReq(p=>({...p,time:v}))} type="time" />
      <FieldTextarea label="Reason" value={req.reason||""} onChange={v=>setReq(p=>({...p,reason:v}))} placeholder="What is the occasion?" />
      {error&&<div style={{background:C.redLight,color:C.red,borderRadius:12,padding:"10px 14px",fontFamily:F,fontSize:13,fontWeight:600,marginBottom:10}}>{error}</div>}
    </div>
  );

  return (
    <div style={{padding:"0 16px 32px"}}>
      <div style={{display:"flex",gap:7,margin:"12px 0 16px",overflowX:"auto",paddingBottom:2}}>
        {[{id:"all",label:"All"},{id:"pending",label:pendingCount?`Pending (${pendingCount})`:"Pending"},{id:"accepted",label:"Accepted"},{id:"declined",label:"Declined"}].map(f=><button key={f.id} onClick={()=>setFilter(f.id)} style={{flexShrink:0,padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:12,background:filter===f.id?C.purple:C.purpleLight,color:filter===f.id?"#fff":C.purple}}>{f.label}</button>)}
      </div>
      {filtered.length===0&&<div style={{textAlign:"center",padding:"32px 0",fontFamily:F,fontSize:14,color:C.muted}}>No requests here</div>}
      {[...filtered].sort((a,b)=>a.date.localeCompare(b.date)).map(req=>{
        const sc=statusConfig[req.status]; const tc=typeConfig[req.type];
        const reqKids=kids.filter(k=>(req.kid_ids||[]).includes(k.id));
        const d=new Date(req.date); const du=Math.ceil((d-new Date())/86400000);
        const dateStr=d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
        return (
          <Card key={req.id} style={{borderLeft:`4px solid ${sc?.color||C.muted}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:20}}>{tc?.emoji}</span><div><div style={{fontFamily:F,fontWeight:800,fontSize:14,color:C.text}}>{tc?.label}</div><div style={{fontFamily:F,fontSize:11,color:C.muted}}>{tc?.desc(req.from_parent)}</div></div></div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><button onClick={()=>{setEditingReq({...req,kidIds:req.kid_ids||[]});setError("");}} style={{background:C.purpleLight,color:C.purple,border:"none",borderRadius:8,padding:"4px 10px",fontFamily:F,fontSize:11,fontWeight:700,cursor:"pointer"}}>Edit</button><Chip text={`${sc?.emoji} ${sc?.label}`} color={sc?.color||C.muted} colorLight={sc?.colorLight||"#F3F4F6"} /></div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
              <Chip text={du<0?dateStr:du===0?"Today":du===1?`Tomorrow - ${dateStr}`:`${du}d - ${dateStr}`} color={du>=0&&du<=2?C.orange:C.teal} colorLight={du>=0&&du<=2?C.orangeLight:C.tealLight} />
              {req.time&&<Chip text={req.time} color={C.purple} colorLight={C.purpleLight} />}
              {reqKids.map(k=><Chip key={k.id} text={`${k.avatar} ${k.name}`} color={k.color} colorLight={k.color_light||C.purpleLight} />)}
            </div>
            <div style={{background:C.bg,borderRadius:12,padding:"10px 12px",marginBottom:10,fontFamily:F,fontSize:13,color:C.text,lineHeight:1.5}}>{req.reason}</div>
            {req.response?<div style={{background:req.status==="accepted"?C.greenLight:C.redLight,borderRadius:12,padding:"10px 12px",marginBottom:10,fontFamily:F,fontSize:13,color:req.status==="accepted"?C.green:C.red,lineHeight:1.5}}>{req.response}</div>:null}
            {req.status==="pending"&&(respondingTo===req.id
              ?<div><FieldTextarea label="Comment (optional)" value={responseText} onChange={setResponseText} placeholder="e.g. No problem!" /><div style={{display:"flex",gap:10}}><button onClick={()=>respond(req.id,"accepted")} style={{flex:1,padding:"12px 0",borderRadius:14,border:"none",cursor:"pointer",background:C.green,color:"#fff",fontFamily:F,fontWeight:800,fontSize:14}}>Accept</button><button onClick={()=>respond(req.id,"declined")} style={{flex:1,padding:"12px 0",borderRadius:14,border:"none",cursor:"pointer",background:C.red,color:"#fff",fontFamily:F,fontWeight:800,fontSize:14}}>Decline</button></div><button onClick={()=>setRespondingTo(null)} style={{width:"100%",marginTop:8,padding:"10px 0",borderRadius:14,border:`2px solid ${C.purpleLight}`,background:"transparent",fontFamily:F,fontWeight:700,fontSize:13,color:C.muted,cursor:"pointer"}}>Cancel</button></div>
              :<button onClick={()=>setRespondingTo(req.id)} style={{width:"100%",padding:"12px 0",borderRadius:14,border:"none",cursor:"pointer",background:`linear-gradient(135deg, ${C.purple}, ${C.pink})`,color:"#fff",fontFamily:F,fontWeight:800,fontSize:14}}>Respond</button>
            )}
          </Card>
        );
      })}
      <button onClick={()=>{setShowNew(true);setError("");}} style={{width:"100%",padding:"14px 0",borderRadius:16,border:`2px dashed ${C.purpleLight}`,background:"transparent",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:14,color:C.purple,marginTop:4}}>+ New request</button>
      {showNew&&<Modal onClose={()=>{setShowNew(false);setError("");}}><div style={{padding:"20px 20px 0",fontFamily:F,fontWeight:900,fontSize:20,color:C.text,marginBottom:16}}>New request</div><ReqForm req={newReq} setReq={setNewReq} /><div style={{padding:"0 20px"}}><PrimaryBtn onClick={submitNew}>Send request</PrimaryBtn><GhostBtn onClick={()=>{setShowNew(false);setError("");}}>Cancel</GhostBtn></div></Modal>}
      {editingReq&&<Modal onClose={()=>{setEditingReq(null);setError("");}}><div style={{padding:"20px 20px 0",fontFamily:F,fontWeight:900,fontSize:20,color:C.text,marginBottom:16}}>Edit request</div><ReqForm req={editingReq} setReq={setEditingReq} /><div style={{padding:"0 20px"}}><PrimaryBtn onClick={saveEdit}>Save changes</PrimaryBtn><DeleteBtn onClick={async()=>{await db.remove("extras",editingReq.id);setExtras(prev=>prev.filter(e=>e.id!==editingReq.id));setEditingReq(null);}} /><GhostBtn onClick={()=>{setEditingReq(null);setError("");}}>Cancel</GhostBtn></div></Modal>}
    </div>
  );
}

// ── Holidays Screen ───────────────────────────────────────────────────────────
function HolidaysScreen({ holidays, setHolidays, familyId, db }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [form, setForm] = useState({name:"",start_date:"",end_date:"",dad_days:[],emoji:"\uD83C\uDFD6\uFE0F"});
  const [error, setError] = useState("");

  const submit = async () => {
    if (!form.name.trim()||!form.start_date||!form.end_date){setError("Please fill in name and dates");return;}
    if (new Date(form.end_date)<new Date(form.start_date)){setError("End must be after start");return;}
    setError("");
    if (editingId){ await db.update("holidays",editingId,form); setHolidays(prev=>prev.map(h=>h.id===editingId?{...h,...form}:h)); }
    else { const nh=await db.add("holidays",form); if(nh) setHolidays(prev=>[...prev,nh]); }
    setShowAdd(false); setEditingId(null);
  };

  const getStatus = h => { const today=new Date(),s=new Date(h.start_date),e=new Date(h.end_date); if(today<s) return {label:`In ${Math.ceil((s-today)/86400000)}d`,color:C.teal,colorLight:C.tealLight}; if(today>e) return {label:"Done",color:C.muted,colorLight:"#F3F4F6"}; return {label:"Now!",color:C.green,colorLight:C.greenLight}; };
  const getDuration = h => { const n=Math.round((new Date(h.end_date)-new Date(h.start_date))/86400000)+1; return n===1?"1 day":`${n} days`; };

  return (
    <div style={{padding:"0 16px 32px"}}>
      {[...holidays].sort((a,b)=>a.start_date.localeCompare(b.start_date)).map(h=>{const status=getStatus(h);return(
        <Card key={h.id}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:48,height:48,borderRadius:16,background:C.yellowLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>{h.emoji}</div><div><div style={{fontFamily:F,fontWeight:800,fontSize:16,color:C.text}}>{h.name}</div><div style={{fontFamily:F,fontSize:12,color:C.muted,marginTop:2}}>{new Date(h.start_date).toLocaleDateString("en-GB",{day:"numeric",month:"short"})} to {new Date(h.end_date).toLocaleDateString("en-GB",{day:"numeric",month:"short"})} ({getDuration(h)})</div></div></div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}><Chip text={status.label} color={status.color} colorLight={status.colorLight} /><button onClick={()=>{setForm({name:h.name,start_date:h.start_date,end_date:h.end_date,dad_days:h.dad_days||[],emoji:h.emoji});setEditingId(h.id);setShowAdd(true);}} style={{background:C.purpleLight,color:C.purple,border:"none",borderRadius:8,padding:"5px 10px",fontFamily:F,fontSize:12,fontWeight:700,cursor:"pointer"}}>Edit</button></div>
          </div>
          <div style={{background:C.yellowLight,borderRadius:10,padding:"8px 12px",fontFamily:F,fontSize:12,color:C.yellow,fontWeight:600,textAlign:"center"}}>Default schedule applies during this period</div>
        </Card>
      );})}
      {holidays.length===0&&<div style={{textAlign:"center",padding:"40px 0",fontFamily:F,fontSize:14,color:C.muted}}>No holidays added yet</div>}
      <button onClick={()=>{setForm({name:"",start_date:"",end_date:"",dad_days:[],emoji:"\uD83C\uDFD6\uFE0F"});setError("");setEditingId(null);setShowAdd(true);}} style={{width:"100%",padding:"14px 0",borderRadius:16,border:`2px dashed ${C.yellowLight}`,background:"transparent",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:14,color:C.yellow,marginTop:4}}>+ Add holiday period</button>

  const getDaysUntil = ds=>Math.ceil((getNextBirthday(ds)-today)/86400000);

// ── Handover Screen ───────────────────────────────────────────────────────────
function HandoverScreen({ notes, setNotes, kids, familyId, db }) {
  const [showAdd, setShowAdd] = useState(false);
  const [filterKid, setFilterKid] = useState("all");
  const [filterCat, setFilterCat] = useState("all");
  const [form, setForm] = useState({from_parent:"dad",kid_ids:[],category:"general",note:""});
  const [error, setError] = useState("");

  const filtered = notes
    .filter(n=>filterKid==="all"||(n.kid_ids||[]).includes(filterKid)||(n.kid_ids||[]).length===0)
    .filter(n=>filterCat==="all"||n.category===filterCat);

  const submit = async () => {
    if (!form.note.trim()){setError("Please write a note");return;}
    setError("");
    const nn = await db.add("notes",{...form});
    if (nn) setNotes(prev=>[nn,...prev]);
    setForm({from_parent:"dad",kid_ids:[],category:"general",note:""}); setShowAdd(false);
  };

  const formatTime = ts => {
    const diff=Math.floor((Date.now()-new Date(ts))/60000);
    if(diff<1) return "Just now"; if(diff<60) return `${diff}m ago`;
    const h=Math.floor(diff/60); if(h<24) return `${h}h ago`;
    const d=Math.floor(h/24); if(d===1) return "Yesterday"; if(d<7) return `${d}d ago`;
    return new Date(ts).toLocaleDateString("en-GB",{day:"numeric",month:"short"});
  };

  return (
    <div style={{padding:"0 16px 32px"}}>
      <div style={{display:"flex",gap:7,margin:"12px 0 8px",overflowX:"auto",paddingBottom:2}}>
        <button onClick={()=>setFilterKid("all")} style={{flexShrink:0,padding:"7px 14px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:12,background:filterKid==="all"?C.purple:C.purpleLight,color:filterKid==="all"?"#fff":C.purple}}>All</button>
        {kids.map(k=><button key={k.id} onClick={()=>setFilterKid(filterKid===k.id?"all":k.id)} style={{flexShrink:0,padding:"7px 14px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:12,background:filterKid===k.id?k.color:(k.color_light||C.purpleLight),color:filterKid===k.id?"#fff":k.color}}>{k.avatar} {k.name}</button>)}
      </div>
      <div style={{display:"flex",gap:7,marginBottom:16,overflowX:"auto",paddingBottom:2}}>
        <button onClick={()=>setFilterCat("all")} style={{flexShrink:0,padding:"7px 14px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:12,background:filterCat==="all"?C.text:"#F3F4F6",color:filterCat==="all"?"#fff":C.muted}}>All types</button>
        {noteCategories.map(cat=><button key={cat.id} onClick={()=>setFilterCat(filterCat===cat.id?"all":cat.id)} style={{flexShrink:0,padding:"7px 14px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:12,background:filterCat===cat.id?cat.color:cat.colorLight,color:filterCat===cat.id?"#fff":cat.color}}>{cat.emoji} {cat.label}</button>)}
      </div>
      {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0"}}><div style={{fontFamily:F,fontWeight:700,fontSize:16,color:C.text,marginBottom:6}}>No notes yet</div><div style={{fontFamily:F,fontSize:13,color:C.muted}}>Leave a note at each handover with health updates, reminders, or anything useful.</div></div>}
      {filtered.map(n=>{const cat=noteCategories.find(c=>c.id===n.category)||noteCategories[0]; const noteKids=kids.filter(k=>(n.kid_ids||[]).includes(k.id)); return(
        <Card key={n.id} style={{borderLeft:`4px solid ${cat.color}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:36,height:36,borderRadius:12,background:cat.colorLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{cat.emoji}</div><div><div style={{fontFamily:F,fontWeight:800,fontSize:13,color:C.text}}>{cat.label}</div><div style={{fontFamily:F,fontSize:11,color:C.muted}}>From {n.from_parent==="dad"?"Dad":"Mum"} - {formatTime(n.created_at)}</div></div></div><div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>{noteKids.map(k=><Chip key={k.id} text={k.name} color={k.color} colorLight={k.color_light||C.purpleLight} />)}{noteKids.length===0&&<Chip text="General" color={C.muted} colorLight="#F3F4F6" />}</div></div>
          <div style={{background:C.bg,borderRadius:12,padding:"12px 14px",fontFamily:F,fontSize:14,color:C.text,lineHeight:1.6}}>{n.note}</div>
          <button onClick={async()=>{await db.remove("notes",n.id);setNotes(prev=>prev.filter(note=>note.id!==n.id));}} style={{marginTop:10,background:"none",border:"none",fontFamily:F,fontSize:12,color:C.muted,cursor:"pointer",opacity:0.6}}>Remove</button>
        </Card>
      );})}
      <button onClick={()=>{setShowAdd(true);setError("");}} style={{width:"100%",padding:"14px 0",borderRadius:16,border:`2px dashed ${C.purpleLight}`,background:"transparent",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:14,color:C.purple,marginTop:4}}>+ Leave a handover note</button>
      {showAdd&&<Modal onClose={()=>{setShowAdd(false);setError("");}}><div style={{padding:"20px 20px 0",fontFamily:F,fontWeight:900,fontSize:20,color:C.text,marginBottom:16}}>Handover note</div><div style={{padding:"0 20px"}}><div style={{marginBottom:14}}><div style={{fontFamily:F,fontSize:11,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>From</div><div style={{display:"flex",gap:8}}>{["dad","mum"].map(pw=><button key={pw} onClick={()=>setForm(prev=>({...prev,from_parent:pw}))} style={{flex:1,padding:"10px 0",borderRadius:14,border:"none",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:14,background:form.from_parent===pw?(pw==="dad"?C.blue:C.pink):(pw==="dad"?C.blueLight:C.pinkLight),color:form.from_parent===pw?"#fff":(pw==="dad"?C.blue:C.pink)}}>{pw==="dad"?"Dad":"Mum"}</button>)}</div></div><div style={{marginBottom:14}}><div style={{fontFamily:F,fontSize:11,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>About (optional)</div><div style={{display:"flex",gap:8}}>{kids.map(k=><button key={k.id} onClick={()=>setForm(p=>({...p,kid_ids:p.kid_ids.includes(k.id)?p.kid_ids.filter(id=>id!==k.id):[...p.kid_ids,k.id]}))} style={{flex:1,padding:"10px 0",borderRadius:14,border:"none",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:14,background:form.kid_ids.includes(k.id)?k.color:(k.color_light||C.purpleLight),color:form.kid_ids.includes(k.id)?"#fff":k.color}}>{k.avatar} {k.name}</button>)}</div></div><div style={{marginBottom:14}}><div style={{fontFamily:F,fontSize:11,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>Type</div><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{noteCategories.map(cat=><button key={cat.id} onClick={()=>setForm(p=>({...p,category:cat.id}))} style={{padding:"7px 12px",borderRadius:12,border:"none",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:12,background:form.category===cat.id?cat.color:cat.colorLight,color:form.category===cat.id?"#fff":cat.color}}>{cat.emoji} {cat.label}</button>)}</div></div><FieldTextarea label="Note" value={form.note} onChange={v=>setForm(p=>({...p,note:v}))} placeholder="e.g. Leo has a cold, gave Calpol at 6pm." />{error&&<div style={{background:C.redLight,color:C.red,borderRadius:12,padding:"10px 14px",fontFamily:F,fontSize:13,fontWeight:600,marginBottom:10}}>{error}</div>}<PrimaryBtn onClick={submit}>Leave note</PrimaryBtn><GhostBtn onClick={()=>{setShowAdd(false);setError("");}}>Cancel</GhostBtn></div></Modal>}
    </div>
  );
}

// ── Scan Screen ───────────────────────────────────────────────────────────────
function ScanScreen({ kids, setEvents, onClose, familyId, db }) {
  const [image, setImage] = useState(null);
  const [imageBase64, setImageBase64] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");
  const [saved, setSaved] = useState(false);

  const handleFile = file => { if(!file) return; setResult(null); setSaved(false); setError(""); setImage(URL.createObjectURL(file)); const reader=new FileReader(); reader.onload=()=>setImageBase64(reader.result.split(",")[1]); reader.readAsDataURL(file); };

  const scan = async () => {
    if (!imageBase64) return; setScanning(true); setResult(null); setError("");
    try {
      const today=new Date().toISOString().slice(0,10);
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:imageBase64}},{type:"text",text:`Extract the key event from this letter or document. Today is ${today}. Reply ONLY with JSON, no markdown:\n{"title":"short title","date":"YYYY-MM-DD or null","time":"HH:MM or empty","type":"medical|school|sport|other","emoji":"single emoji","who":"dad","kid_ids":[],"notes":"2-3 sentence summary"}`}]}]})});
      const data=await res.json(); const raw=data.content.map(b=>b.text||"").join(""); const clean=raw.replace(/```json|```/g,"").trim(); setResult(JSON.parse(clean));
    } catch(e) { setError("Could not read the document. Please try a clearer photo."); }
    setScanning(false);
  };

  const saveToCalendar = async () => {
    if (!result) return;
    const kidIds = result.kid_ids&&result.kid_ids.length?result.kid_ids:[kids[0]?.id];
    const ne = await db.add("events",{...result,kid_ids:kidIds});
    if (ne) setEvents(prev=>[...prev,ne]);
    setSaved(true); setTimeout(onClose,900);
  };

  const et = result?(eventTypes.find(t=>t.id===result.type)||eventTypes[3]):null;

  return (
    <div style={{padding:"0 16px 32px"}}>
      <div style={{fontFamily:F,fontSize:14,color:C.muted,margin:"12px 0 16px",lineHeight:1.6}}>Photo a hospital letter, school trip form or appointment card. Baton will read it and add it to your calendar.</div>
      <label style={{display:"block",cursor:"pointer"}}>
        <input type="file" accept="image/*" capture="environment" onChange={e=>handleFile(e.target.files[0])} style={{display:"none"}} />
        <div style={{border:`2px dashed ${image?C.purple:C.purpleLight}`,borderRadius:16,padding:"24px 16px",textAlign:"center",background:image?C.purpleLight:C.card}}>
          {image?<img src={image} alt="scanned" style={{width:"100%",borderRadius:12,maxHeight:220,objectFit:"cover"}} />:<div><div style={{fontSize:36,marginBottom:8}}>{"\uD83D\uDCF8"}</div><div style={{fontFamily:F,fontWeight:700,fontSize:15,color:C.purple}}>Tap to take photo or upload</div><div style={{fontFamily:F,fontSize:12,color:C.muted,marginTop:4}}>Hospital letters, school trips, appointment cards...</div></div>}
        </div>
      </label>
      {image&&!scanning&&!result&&<PrimaryBtn onClick={scan}>Scan document</PrimaryBtn>}
      {image&&<GhostBtn onClick={()=>{setImage(null);setImageBase64(null);setResult(null);setSaved(false);setError("");}}>Choose different photo</GhostBtn>}
      {scanning&&<Card style={{textAlign:"center",padding:"32px 20px",marginTop:12}}><div style={{fontFamily:F,fontWeight:700,fontSize:16,color:C.purple,marginBottom:6}}>Reading document...</div></Card>}
      {error&&<Card style={{background:C.redLight,borderLeft:`4px solid ${C.red}`,marginTop:12}}><div style={{fontFamily:F,fontWeight:700,fontSize:14,color:C.red}}>{error}</div></Card>}
      {result&&!saved&&<div style={{marginTop:16}}><SecLabel>Found this event</SecLabel><Card style={{borderLeft:`4px solid ${et?et.color:C.purple}`}}><div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}><div style={{width:48,height:48,borderRadius:16,background:et?et.colorLight:C.purpleLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>{result.emoji}</div><div><div style={{fontFamily:F,fontWeight:900,fontSize:17,color:C.text}}>{result.title}</div><div style={{fontFamily:F,fontSize:13,color:C.muted}}>{result.date?new Date(result.date).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"long",year:"numeric"}):"Date not found"}{result.time?` at ${result.time}`:""}</div></div></div>{result.notes&&<div style={{background:C.bg,borderRadius:12,padding:"12px 14px",marginBottom:12,fontFamily:F,fontSize:13,color:C.text,lineHeight:1.6}}>{result.notes}</div>}<div style={{marginBottom:14}}><div style={{fontFamily:F,fontSize:11,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>Which kids?</div><div style={{display:"flex",gap:8}}>{kids.map(k=><button key={k.id} onClick={()=>setResult(p=>({...p,kid_ids:(p.kid_ids||[]).includes(k.id)?(p.kid_ids||[]).filter(id=>id!==k.id):[...(p.kid_ids||[]),k.id]}))} style={{flex:1,padding:"10px 0",borderRadius:14,border:"none",cursor:"pointer",fontFamily:F,fontWeight:700,fontSize:14,background:(result.kid_ids||[]).includes(k.id)?k.color:(k.color_light||C.purpleLight),color:(result.kid_ids||[]).includes(k.id)?"#fff":k.color}}>{k.avatar} {k.name}</button>)}</div></div><PrimaryBtn onClick={saveToCalendar}>Add to calendar</PrimaryBtn><GhostBtn onClick={()=>{setResult(null);setImage(null);setImageBase64(null);}}>Scan again</GhostBtn></Card></div>}
      {saved&&<Card style={{textAlign:"center",padding:"32px 20px",background:C.greenLight,marginTop:12}}><div style={{fontFamily:F,fontWeight:800,fontSize:16,color:C.green}}>Added to calendar!</div></Card>}
    </div>
  );
}

    // Mount
    function mountApp() {
      const container = document.getElementById('root');
      const root = ReactDOM.createRoot(container);
      root.render(React.createElement(Baton));
    }

    if (window._batonSBReady) {
      mountApp();
    } else {
      document.addEventListener('supabase-ready', mountApp);
    }
  </script>
</body>
</html>
